name: Fetch ARA Stocks (Insights Global via Argus)

on:
  # Cron disabled 16 May 2026. Source went dark in late April 2026:
  # Argus Media restructured article URLs to numeric-id-first slugs and
  # Insights Global stopped surfacing the weekly ARA stocks report in
  # their public sitemap (likely moved behind their commercial subscription).
  # Re-enable by un-commenting the two cron lines below once a replacement
  # source is in place. workflow_dispatch is preserved for manual triggers.
  # schedule:
  #   - cron: '0 6 * * 5'
  #   - cron: '0 6 * * 6'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ara-stocks
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch ARA stocks
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run fetch:ara-stocks

      - name: Commit if changed
        run: |
          git config user.name "EuroOilWatch Bot"
          git config user.email "bot@eurooilwatch.com"
          git pull --rebase origin main
          git add data/ara-stocks.json
          git diff --staged --quiet || git commit -m "chore: update ARA stocks $(date -u +%Y-%m-%d)"
          git push
