name: Update Data Pipeline

on:
  schedule:
    # Times are staggered OFF the top of the hour: GitHub drops/delays far fewer
    # off-:00 scheduled runs. Three daily runs give redundancy — if GitHub skips
    # one, a later one catches it the same day.
    - cron: '7 5 * * *'    # 05:07 UTC (07:07 CEST) — morning
    - cron: '23 12 * * *'  # 12:23 UTC — midday redundancy (catches a dropped morning run)
    - cron: '43 17 * * *'  # 17:43 UTC — evening; national station-price feeds (FR/ES/IT/DE) refreshed
    - cron: '17 16 * * 4'  # 16:17 UTC Thu — after EC Oil Bulletin publishes
  workflow_dispatch: # Allow manual triggers

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch oil stock data
        run: npm run fetch:stocks
        continue-on-error: true

      - name: Fetch stock history (18 months)
        run: npm run fetch:history
        continue-on-error: true

      - name: Fetch EU crude import origins (Eurostat NRG_TI_OIL)
        run: npm run fetch:eu-crude
        continue-on-error: true

      - name: Fetch fuel prices
        run: npm run fetch:prices
        continue-on-error: true

      - name: Fetch Brent crude price
        run: npm run fetch:brent
        continue-on-error: true

      - name: Fetch EIA Brent daily history (1987→today)
        run: npm run fetch:brent-eia
        continue-on-error: true

      - name: Fetch Brent 3-2-1 crack spread (refining margin)
        run: npm run fetch:crack
        continue-on-error: true

      - name: Fetch European gasoil (diesel) crack
        run: npm run fetch:gasoil
        continue-on-error: true

      - name: Fetch Dow–Nasdaq divergence (FRED)
        run: npm run fetch:divergence
        continue-on-error: true

      - name: Fetch sea-state at shipping chokepoints
        run: npm run fetch:sea-state
        continue-on-error: true

      - name: Fetch gas tracker (TTF, Henry Hub, AGSI storage)
        run: npm run fetch:gas
        env:
          AGSI_API_KEY: ${{ secrets.AGSI_API_KEY }}
        continue-on-error: true

      - name: Fetch French station-level fuel prices (prix-carburants)
        run: npm run fetch:france
        continue-on-error: true

      - name: Fetch Spanish station-level fuel prices (geoportal-de-hidrocarburos)
        run: npm run fetch:spain
        continue-on-error: true

      - name: Fetch Italian station-level fuel prices (MIMIT)
        run: npm run fetch:italy
        continue-on-error: true

      - name: Fetch Portuguese station-level fuel prices (DGEG)
        run: npm run fetch:portugal
        continue-on-error: true

      - name: Fetch bunker fuel prices
        run: npm run fetch:bunker
        continue-on-error: true

      - name: Fetch MARAD maritime advisories
        run: npm run fetch:marad
        continue-on-error: true

      - name: Fetch CENTCOM advisories (Middle East maritime)
        run: npm run fetch:centcom
        continue-on-error: true

      - name: Fetch CREA energy research feed
        run: npm run fetch:crea
        continue-on-error: true

      - name: Fetch IMF PortWatch chokepoint transit data
        run: npm run fetch:portwatch
        continue-on-error: true

      - name: Fetch IMF PortWatch port oil-flow data
        run: npm run fetch:port-flows
        continue-on-error: true

      - name: Fetch refinery outages (trade-press RSS)
        run: npm run fetch:refineries
        continue-on-error: true

      - name: Generate AI analysis
        run: npm run analyze
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        continue-on-error: true

      - name: Commit updated data
        run: |
          git config user.name "EuroOilWatch Bot"
          git config user.email "bot@eurooilwatch.com"
          git add data/
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "chore: update data $(date +%Y-%m-%d)"
          git push

      - name: Trigger Netlify rebuild
        run: curl -s -X POST ${{ secrets.NETLIFY_BUILD_HOOK }}
