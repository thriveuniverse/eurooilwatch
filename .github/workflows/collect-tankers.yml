name: Collect Tanker Snapshots

on:
  schedule:
    # Every 4 hours
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

# Avoid two collectors racing on the same snapshots file
concurrency:
  group: tanker-collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Collect tanker snapshot
        env:
          AISSTREAM_API_KEY: ${{ secrets.AISSTREAM_API_KEY }}
        run: npm run tankers:collect

      - name: Aggregate tanker traffic
        run: npm run tankers:aggregate

      - name: Commit updated tanker data
        run: |
          git config user.name "EuroOilWatch Bot"
          git config user.email "bot@eurooilwatch.com"
          git add data/tanker-snapshots.json data/tanker-traffic.json
          if git diff --staged --quiet; then
            echo "No tanker data changes to commit"
            exit 0
          fi
          git commit -m "chore: tanker snapshot $(date -u +%Y-%m-%dT%H:%MZ)"
          git pull --rebase origin main
          git push
